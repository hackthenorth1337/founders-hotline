<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="s" width="56" height="56" patternUnits="userSpaceOnUse" patternTransform="rotate(-52)">
      <rect width="28" height="56" fill="#96f99b"/>
      <rect x="28" width="28" height="56" fill="#090909"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#090909"/>

  <!-- Top stripe -->
  <rect y="0" width="1200" height="32" fill="url(#s)"/>
  <!-- Bottom stripe -->
  <rect y="598" width="1200" height="32" fill="url(#s)"/>

  <!-- hack.vc label -->
  <text x="72" y="118" font-family="'Courier New', Courier, monospace" font-weight="700" font-size="22" fill="#96f99b" letter-spacing="6" opacity="0.9">HACK.VC</text>

  <!-- FOUNDERS -->
  <text x="68" y="330" font-family="Impact, 'Arial Black', sans-serif" font-size="220" fill="#F2EDE4" letter-spacing="-4">FOUNDERS</text>

  <!-- HOTLINE. -->
  <text x="68" y="520" font-family="Impact, 'Arial Black', sans-serif" font-size="220" fill="#96f99b" letter-spacing="-4">HOTLINE<tspan fill="#E0001A">.</tspan></text>

  <!-- Tagline -->
  <text x="72" y="568" font-family="'Courier New', Courier, monospace" font-size="20" fill="#F2EDE4" opacity="0.5" letter-spacing="2">WE GET BACK IN 3 DAYS. EVERY TIME.</text>

  <!-- 72 watermark -->
  <text x="1130" y="490" font-family="Impact, 'Arial Black', sans-serif" font-size="260" fill="#96f99b" text-anchor="middle" opacity="0.07">72</text>
</svg>
